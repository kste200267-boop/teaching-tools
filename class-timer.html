<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>교실 타이머</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #1a1a2e;
  --surface: #16213e;
  --surface2: #0f3460;
  --text: #eaeaea;
  --text-dim: #a0a0b0;
  --accent: #4fc3f7;
  --accent2: #00e676;
  --danger: #ff5252;
  --blue: #42a5f5;
  --red: #ef5350;
  --work: #ff9800;
  --break-color: #66bb6a;
  --ring-bg: rgba(255,255,255,0.08);
  --radius: 16px;
  --shadow: 0 8px 32px rgba(0,0,0,0.3);
}

.light {
  --bg: #f5f5f5;
  --surface: #ffffff;
  --surface2: #e8e8e8;
  --text: #212121;
  --text-dim: #757575;
  --ring-bg: rgba(0,0,0,0.08);
  --shadow: 0 8px 32px rgba(0,0,0,0.1);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  transition: background 0.3s, color 0.3s;
  overflow-x: hidden;
}

/* Top Bar */
.top-bar {
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 24px;
  background: var(--surface);
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.top-bar h1 {
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--accent);
}

.top-actions {
  display: flex;
  gap: 8px;
}

.top-actions button {
  background: var(--surface2);
  border: none;
  color: var(--text);
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.85rem;
  font-family: inherit;
  transition: all 0.2s;
}

.top-actions button:hover {
  background: var(--accent);
  color: #000;
}

/* Tabs */
.tabs {
  display: flex;
  gap: 4px;
  margin: 20px 0;
  background: var(--surface);
  padding: 6px;
  border-radius: 12px;
}

.tab {
  padding: 10px 24px;
  border: none;
  background: transparent;
  color: var(--text-dim);
  font-family: inherit;
  font-size: 1rem;
  font-weight: 500;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
}

.tab.active {
  background: var(--accent);
  color: #000;
  font-weight: 700;
}

/* Content Area */
.content {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  padding: 20px;
}

.mode {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%;
  max-width: 800px;
  animation: fadeIn 0.3s ease;
}

.mode.active {
  display: flex;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Mode 1: Countdown */
.timer-ring-container {
  position: relative;
  width: 380px;
  height: 380px;
  margin: 20px 0;
}

.timer-ring-container svg {
  width: 100%;
  height: 100%;
  transform: rotate(-90deg);
}

.ring-bg {
  fill: none;
  stroke: var(--ring-bg);
  stroke-width: 12;
}

.ring-progress {
  fill: none;
  stroke: var(--accent);
  stroke-width: 12;
  stroke-linecap: round;
  transition: stroke-dashoffset 0.5s linear;
}

.timer-display {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 5rem;
  font-weight: 900;
  letter-spacing: -2px;
  color: var(--text);
}

@media (min-width: 768px) {
  .timer-ring-container {
    width: 450px;
    height: 450px;
  }
  .timer-display {
    font-size: 8rem;
  }
}

@media (min-width: 1200px) {
  .timer-ring-container {
    width: 500px;
    height: 500px;
  }
  .timer-display {
    font-size: 9rem;
  }
}

.time-setter {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 20px;
}

.time-setter button {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  border: 2px solid var(--accent);
  background: transparent;
  color: var(--accent);
  font-size: 2rem;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}

.time-setter button:hover {
  background: var(--accent);
  color: #000;
}

.time-setter span {
  font-size: 1.5rem;
  font-weight: 700;
  min-width: 80px;
  text-align: center;
}

.controls {
  display: flex;
  gap: 12px;
  margin-top: 20px;
}

.btn {
  padding: 14px 32px;
  border: none;
  border-radius: 12px;
  font-size: 1.1rem;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-primary {
  background: var(--accent);
  color: #000;
}

.btn-primary:hover {
  transform: scale(1.05);
  box-shadow: 0 4px 20px rgba(79, 195, 247, 0.4);
}

.btn-secondary {
  background: var(--surface2);
  color: var(--text);
}

.btn-secondary:hover {
  background: var(--text-dim);
  color: #000;
}

.btn-danger {
  background: var(--danger);
  color: #fff;
}

.btn-danger:hover {
  transform: scale(1.05);
}

/* Mode 2: Debate */
.debate-container {
  display: flex;
  gap: 20px;
  width: 100%;
  max-width: 900px;
  align-items: stretch;
}

.debate-side {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 20px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}

.debate-side::before {
  content: '';
  position: absolute;
  inset: 0;
  opacity: 0.1;
  transition: opacity 0.3s;
}

.debate-side.pro {
  background: rgba(66, 165, 245, 0.1);
  border: 3px solid rgba(66, 165, 245, 0.3);
}

.debate-side.pro::before {
  background: var(--blue);
}

.debate-side.pro.active {
  border-color: var(--blue);
  box-shadow: 0 0 40px rgba(66, 165, 245, 0.3);
}

.debate-side.pro.active::before {
  opacity: 0.2;
}

.debate-side.con {
  background: rgba(239, 83, 80, 0.1);
  border: 3px solid rgba(239, 83, 80, 0.3);
}

.debate-side.con::before {
  background: var(--red);
}

.debate-side.con.active {
  border-color: var(--red);
  box-shadow: 0 0 40px rgba(239, 83, 80, 0.3);
}

.debate-side.con.active::before {
  opacity: 0.2;
}

.debate-label {
  font-size: 1.8rem;
  font-weight: 900;
  margin-bottom: 10px;
}

.debate-side.pro .debate-label { color: var(--blue); }
.debate-side.con .debate-label { color: var(--red); }

.debate-time {
  font-size: 5rem;
  font-weight: 900;
  margin: 20px 0;
}

@media (min-width: 768px) {
  .debate-time {
    font-size: 6rem;
  }
}

.debate-status {
  font-size: 1rem;
  font-weight: 500;
  padding: 6px 16px;
  border-radius: 20px;
  background: rgba(255,255,255,0.1);
}

.debate-side.active .debate-status {
  background: rgba(255,255,255,0.2);
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}

.debate-settings {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
}

.debate-settings label {
  font-size: 0.9rem;
  color: var(--text-dim);
}

.debate-settings input {
  width: 60px;
  padding: 8px;
  border-radius: 8px;
  border: 1px solid var(--text-dim);
  background: var(--surface);
  color: var(--text);
  text-align: center;
  font-size: 1rem;
  font-family: inherit;
}

/* Mode 3: Pomodoro */
.pomo-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
}

.pomo-phase {
  font-size: 1.6rem;
  font-weight: 700;
  margin-bottom: 10px;
  padding: 8px 24px;
  border-radius: 20px;
}

.pomo-phase.work {
  background: rgba(255, 152, 0, 0.2);
  color: var(--work);
}

.pomo-phase.break-phase {
  background: rgba(102, 187, 106, 0.2);
  color: var(--break-color);
}

.pomo-ring .ring-progress {
  stroke: var(--work);
}

.pomo-ring.on-break .ring-progress {
  stroke: var(--break-color);
}

.pomo-rounds {
  font-size: 1.2rem;
  color: var(--text-dim);
  margin-top: 10px;
}

.pomo-rounds .current {
  color: var(--text);
  font-weight: 700;
  font-size: 1.5rem;
}

.pomo-settings {
  display: flex;
  gap: 20px;
  margin-bottom: 20px;
  flex-wrap: wrap;
  justify-content: center;
}

.pomo-settings .setting-group {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}

.pomo-settings label {
  font-size: 0.85rem;
  color: var(--text-dim);
}

.pomo-settings input {
  width: 60px;
  padding: 8px;
  border-radius: 8px;
  border: 1px solid var(--text-dim);
  background: var(--surface);
  color: var(--text);
  text-align: center;
  font-size: 1rem;
  font-family: inherit;
}

/* Flash animation */
.flash {
  animation: flashAnim 0.5s ease 3;
}

@keyframes flashAnim {
  0%, 100% { background: var(--bg); }
  50% { background: var(--danger); }
}

/* Responsive */
@media (max-width: 600px) {
  .debate-container {
    flex-direction: column;
  }
  .debate-time {
    font-size: 3.5rem;
  }
  .timer-display {
    font-size: 3.5rem;
  }
  .timer-ring-container {
    width: 280px;
    height: 280px;
  }
  .tabs {
    flex-wrap: wrap;
    justify-content: center;
  }
  .tab {
    padding: 8px 16px;
    font-size: 0.9rem;
  }
}
</style>
</head>
<body>

<div class="top-bar">
  <h1>교실 타이머</h1>
  <div class="top-actions">
    <button onclick="toggleTheme()" id="themeBtn">라이트</button>
    <button onclick="toggleFullscreen()">전체화면</button>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchMode(0)">카운트다운</button>
  <button class="tab" onclick="switchMode(1)">토론 타이머</button>
  <button class="tab" onclick="switchMode(2)">포모도로</button>
</div>

<div class="content">

  <!-- Mode 1: Countdown -->
  <div class="mode active" id="mode0">
    <div class="time-setter" id="countdownSetter">
      <button onclick="adjustTime(-1)">−</button>
      <span id="setMinutes">5분</span>
      <button onclick="adjustTime(1)">+</button>
    </div>
    <div class="timer-ring-container">
      <svg viewBox="0 0 200 200">
        <circle class="ring-bg" cx="100" cy="100" r="88"/>
        <circle class="ring-progress" id="cdRing" cx="100" cy="100" r="88"
          stroke-dasharray="553" stroke-dashoffset="0"/>
      </svg>
      <div class="timer-display" id="cdDisplay">05:00</div>
    </div>
    <div class="controls">
      <button class="btn btn-primary" id="cdStartBtn" onclick="cdToggle()">시작</button>
      <button class="btn btn-secondary" onclick="cdReset()">초기화</button>
    </div>
  </div>

  <!-- Mode 2: Debate -->
  <div class="mode" id="mode1">
    <div class="debate-settings">
      <label>찬성 시간(분):</label>
      <input type="number" id="proMinInput" value="3" min="1" max="30">
      <label>반대 시간(분):</label>
      <input type="number" id="conMinInput" value="3" min="1" max="30">
      <button class="btn btn-secondary" onclick="debateSetup()" style="padding:8px 16px; font-size:0.9rem;">설정</button>
    </div>
    <div class="debate-container">
      <div class="debate-side pro active" onclick="debateSwitch('pro')">
        <div class="debate-label">찬성</div>
        <div class="debate-time" id="proTime">03:00</div>
        <div class="debate-status" id="proStatus">발언 중</div>
      </div>
      <div class="debate-side con" onclick="debateSwitch('con')">
        <div class="debate-label">반대</div>
        <div class="debate-time" id="conTime">03:00</div>
        <div class="debate-status" id="conStatus">대기</div>
      </div>
    </div>
    <div class="controls" style="margin-top:24px;">
      <button class="btn btn-primary" id="debateStartBtn" onclick="debateToggle()">시작</button>
      <button class="btn btn-secondary" onclick="debateReset()">초기화</button>
    </div>
  </div>

  <!-- Mode 3: Pomodoro -->
  <div class="mode" id="mode2">
    <div class="pomo-settings">
      <div class="setting-group">
        <label>활동(분)</label>
        <input type="number" id="pomoWorkInput" value="25" min="1" max="60">
      </div>
      <div class="setting-group">
        <label>휴식(분)</label>
        <input type="number" id="pomoBreakInput" value="5" min="1" max="30">
      </div>
      <div class="setting-group">
        <label>라운드</label>
        <input type="number" id="pomoRoundsInput" value="4" min="1" max="10">
      </div>
      <button class="btn btn-secondary" onclick="pomoSetup()" style="padding:8px 16px; font-size:0.9rem; align-self:flex-end;">설정</button>
    </div>
    <div class="pomo-phase work" id="pomoPhase">활동 시간</div>
    <div class="timer-ring-container">
      <svg viewBox="0 0 200 200" class="pomo-ring" id="pomoRingSvg">
        <circle class="ring-bg" cx="100" cy="100" r="88"/>
        <circle class="ring-progress" id="pomoRing" cx="100" cy="100" r="88"
          stroke-dasharray="553" stroke-dashoffset="0"/>
      </svg>
      <div class="timer-display" id="pomoDisplay">25:00</div>
    </div>
    <div class="pomo-rounds" id="pomoRounds"><span class="current">1</span> / 4 라운드</div>
    <div class="controls">
      <button class="btn btn-primary" id="pomoStartBtn" onclick="pomoToggle()">시작</button>
      <button class="btn btn-secondary" onclick="pomoReset()">초기화</button>
    </div>
  </div>

</div>

<script>
// ===== Audio =====
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playBeep(freq = 880, duration = 0.3, type = 'sine') {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function playAlarm() {
  for (let i = 0; i < 5; i++) {
    setTimeout(() => playBeep(880, 0.2, 'square'), i * 300);
    setTimeout(() => playBeep(660, 0.2, 'square'), i * 300 + 150);
  }
}

function playTick() {
  playBeep(1200, 0.05, 'sine');
}

// ===== Theme =====
let isDark = true;
function toggleTheme() {
  isDark = !isDark;
  document.body.classList.toggle('light', !isDark);
  document.getElementById('themeBtn').textContent = isDark ? '라이트' : '다크';
}

// ===== Fullscreen =====
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

// ===== Tab switching =====
function switchMode(idx) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', i === idx);
  });
  document.querySelectorAll('.mode').forEach((m, i) => {
    m.classList.toggle('active', i === idx);
  });
}

// ===== Helpers =====
function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}

function flashScreen() {
  document.body.classList.add('flash');
  setTimeout(() => document.body.classList.remove('flash'), 1600);
}

const CIRCUMFERENCE = 2 * Math.PI * 88; // ~553

// ===== Mode 1: Countdown =====
let cdMinutes = 5;
let cdTotalSec = 300;
let cdRemaining = 300;
let cdRunning = false;
let cdInterval = null;

function adjustTime(delta) {
  if (cdRunning) return;
  cdMinutes = Math.max(1, Math.min(60, cdMinutes + delta));
  cdTotalSec = cdMinutes * 60;
  cdRemaining = cdTotalSec;
  document.getElementById('setMinutes').textContent = cdMinutes + '분';
  document.getElementById('cdDisplay').textContent = formatTime(cdRemaining);
  updateCdRing();
}

function updateCdRing() {
  const progress = cdRemaining / cdTotalSec;
  const offset = CIRCUMFERENCE * (1 - progress);
  document.getElementById('cdRing').style.strokeDashoffset = offset;
}

function cdToggle() {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (cdRunning) {
    clearInterval(cdInterval);
    cdRunning = false;
    document.getElementById('cdStartBtn').textContent = '계속';
  } else {
    if (cdRemaining <= 0) return;
    cdRunning = true;
    document.getElementById('cdStartBtn').textContent = '일시정지';
    document.getElementById('countdownSetter').style.opacity = '0.3';
    cdInterval = setInterval(() => {
      cdRemaining--;
      document.getElementById('cdDisplay').textContent = formatTime(cdRemaining);
      updateCdRing();
      if (cdRemaining <= 3 && cdRemaining > 0) playTick();
      if (cdRemaining <= 0) {
        clearInterval(cdInterval);
        cdRunning = false;
        document.getElementById('cdStartBtn').textContent = '시작';
        playAlarm();
        flashScreen();
      }
    }, 1000);
  }
}

function cdReset() {
  clearInterval(cdInterval);
  cdRunning = false;
  cdRemaining = cdTotalSec;
  document.getElementById('cdDisplay').textContent = formatTime(cdRemaining);
  document.getElementById('cdStartBtn').textContent = '시작';
  document.getElementById('countdownSetter').style.opacity = '1';
  updateCdRing();
}

// ===== Mode 2: Debate =====
let debateProSec = 180;
let debateConSec = 180;
let debateProRemain = 180;
let debateConRemain = 180;
let debateActive = 'pro'; // 'pro' or 'con'
let debateRunning = false;
let debateInterval = null;

function debateSetup() {
  if (debateRunning) return;
  const proMin = parseInt(document.getElementById('proMinInput').value) || 3;
  const conMin = parseInt(document.getElementById('conMinInput').value) || 3;
  debateProSec = proMin * 60;
  debateConSec = conMin * 60;
  debateProRemain = debateProSec;
  debateConRemain = debateConSec;
  updateDebateDisplay();
}

function updateDebateDisplay() {
  document.getElementById('proTime').textContent = formatTime(debateProRemain);
  document.getElementById('conTime').textContent = formatTime(debateConRemain);

  const proSide = document.querySelector('.debate-side.pro');
  const conSide = document.querySelector('.debate-side.con');
  proSide.classList.toggle('active', debateActive === 'pro');
  conSide.classList.toggle('active', debateActive === 'con');

  document.getElementById('proStatus').textContent = debateActive === 'pro' ? '발언 중' : '대기';
  document.getElementById('conStatus').textContent = debateActive === 'con' ? '발언 중' : '대기';
}

function debateSwitch(side) {
  if (!debateRunning) return;
  debateActive = side;
  updateDebateDisplay();
  playBeep(600, 0.1);
}

function debateToggle() {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (debateRunning) {
    clearInterval(debateInterval);
    debateRunning = false;
    document.getElementById('debateStartBtn').textContent = '계속';
  } else {
    debateRunning = true;
    document.getElementById('debateStartBtn').textContent = '일시정지';
    debateInterval = setInterval(() => {
      if (debateActive === 'pro') {
        debateProRemain--;
        if (debateProRemain <= 3 && debateProRemain > 0) playTick();
        if (debateProRemain <= 0) {
          debateProRemain = 0;
          playAlarm();
          flashScreen();
          debateActive = 'con';
        }
      } else {
        debateConRemain--;
        if (debateConRemain <= 3 && debateConRemain > 0) playTick();
        if (debateConRemain <= 0) {
          debateConRemain = 0;
          playAlarm();
          flashScreen();
          clearInterval(debateInterval);
          debateRunning = false;
          document.getElementById('debateStartBtn').textContent = '시작';
        }
      }
      updateDebateDisplay();
    }, 1000);
  }
}

function debateReset() {
  clearInterval(debateInterval);
  debateRunning = false;
  debateActive = 'pro';
  debateProRemain = debateProSec;
  debateConRemain = debateConSec;
  document.getElementById('debateStartBtn').textContent = '시작';
  updateDebateDisplay();
}

// ===== Mode 3: Pomodoro =====
let pomoWorkSec = 25 * 60;
let pomoBreakSec = 5 * 60;
let pomoTotalRounds = 4;
let pomoCurrentRound = 1;
let pomoIsWork = true;
let pomoRemaining = 25 * 60;
let pomoRunning = false;
let pomoInterval = null;

function pomoSetup() {
  if (pomoRunning) return;
  const workMin = parseInt(document.getElementById('pomoWorkInput').value) || 25;
  const breakMin = parseInt(document.getElementById('pomoBreakInput').value) || 5;
  const rounds = parseInt(document.getElementById('pomoRoundsInput').value) || 4;
  pomoWorkSec = workMin * 60;
  pomoBreakSec = breakMin * 60;
  pomoTotalRounds = rounds;
  pomoCurrentRound = 1;
  pomoIsWork = true;
  pomoRemaining = pomoWorkSec;
  updatePomoDisplay();
}

function updatePomoDisplay() {
  document.getElementById('pomoDisplay').textContent = formatTime(pomoRemaining);

  const total = pomoIsWork ? pomoWorkSec : pomoBreakSec;
  const progress = pomoRemaining / total;
  const offset = CIRCUMFERENCE * (1 - progress);
  document.getElementById('pomoRing').style.strokeDashoffset = offset;

  const phase = document.getElementById('pomoPhase');
  const ringSvg = document.getElementById('pomoRingSvg');
  if (pomoIsWork) {
    phase.textContent = '활동 시간';
    phase.className = 'pomo-phase work';
    ringSvg.classList.remove('on-break');
  } else {
    phase.textContent = '휴식 시간';
    phase.className = 'pomo-phase break-phase';
    ringSvg.classList.add('on-break');
  }

  document.getElementById('pomoRounds').innerHTML =
    `<span class="current">${pomoCurrentRound}</span> / ${pomoTotalRounds} 라운드`;
}

function pomoToggle() {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (pomoRunning) {
    clearInterval(pomoInterval);
    pomoRunning = false;
    document.getElementById('pomoStartBtn').textContent = '계속';
  } else {
    pomoRunning = true;
    document.getElementById('pomoStartBtn').textContent = '일시정지';
    pomoInterval = setInterval(() => {
      pomoRemaining--;
      if (pomoRemaining <= 3 && pomoRemaining > 0) playTick();
      if (pomoRemaining <= 0) {
        playAlarm();
        flashScreen();
        if (pomoIsWork) {
          pomoIsWork = false;
          pomoRemaining = pomoBreakSec;
        } else {
          pomoIsWork = true;
          pomoCurrentRound++;
          if (pomoCurrentRound > pomoTotalRounds) {
            clearInterval(pomoInterval);
            pomoRunning = false;
            pomoCurrentRound = pomoTotalRounds;
            document.getElementById('pomoStartBtn').textContent = '완료!';
            updatePomoDisplay();
            return;
          }
          pomoRemaining = pomoWorkSec;
        }
      }
      updatePomoDisplay();
    }, 1000);
  }
}

function pomoReset() {
  clearInterval(pomoInterval);
  pomoRunning = false;
  pomoCurrentRound = 1;
  pomoIsWork = true;
  pomoRemaining = pomoWorkSec;
  document.getElementById('pomoStartBtn').textContent = '시작';
  updatePomoDisplay();
}

// Init
updateCdRing();
updateDebateDisplay();
updatePomoDisplay();
</script>
</body>
