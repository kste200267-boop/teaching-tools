<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>칭찬 스티커판</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #FFD700;
  --warm-yellow: #FFF3CD;
  --orange: #FF8C00;
  --deep-orange: #E65100;
  --bg: #FFFDE7;
  --card-bg: #FFFFFF;
  --shadow: rgba(255, 152, 0, 0.15);
  --text: #3E2723;
  --text-light: #795548;
  --success: #4CAF50;
  --danger: #F44336;
  --border-radius: 12px;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 16px;
  transition: all 0.3s;
}

/* TV Display Mode */
body.tv-mode {
  padding: 32px;
  font-size: 1.4em;
}

body.tv-mode .header h1 {
  font-size: 2.5em;
}

body.tv-mode .student-row {
  padding: 20px 24px;
  min-height: 80px;
}

body.tv-mode .student-name {
  font-size: 1.4em;
}

body.tv-mode .sticker-count {
  font-size: 1.6em;
}

body.tv-mode .sticker-icons {
  font-size: 1.6em;
}

body.tv-mode .controls {
  display: none;
}

/* Header */
.header {
  text-align: center;
  margin-bottom: 20px;
}

.header h1 {
  font-size: 1.8em;
  font-weight: 900;
  background: linear-gradient(135deg, var(--orange), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 4px;
}

.header p {
  color: var(--text-light);
  font-size: 0.9em;
}

/* Controls */
.controls {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 16px;
  align-items: center;
  justify-content: center;
}

.controls button, .controls select {
  padding: 8px 16px;
  border: none;
  border-radius: 8px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 0.85em;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}

.controls button {
  background: linear-gradient(135deg, var(--orange), #FFA726);
  color: white;
  box-shadow: 0 2px 8px var(--shadow);
}

.controls button:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 12px var(--shadow);
}

.controls button:active {
  transform: translateY(0);
}

.controls button.danger {
  background: linear-gradient(135deg, var(--danger), #E57373);
}

.controls button.success {
  background: linear-gradient(135deg, var(--success), #81C784);
}

.controls button.tv-btn {
  background: linear-gradient(135deg, #5C6BC0, #7986CB);
}

.controls select {
  background: white;
  border: 2px solid #FFE0B2;
  color: var(--text);
  appearance: auto;
}

/* Student Input */
.input-section {
  background: var(--card-bg);
  border-radius: var(--border-radius);
  padding: 16px;
  margin-bottom: 16px;
  box-shadow: 0 2px 12px var(--shadow);
}

.input-section h3 {
  font-size: 0.95em;
  margin-bottom: 8px;
  color: var(--deep-orange);
}

.input-row {
  display: flex;
  gap: 8px;
}

.input-row input {
  flex: 1;
  padding: 10px 14px;
  border: 2px solid #FFE0B2;
  border-radius: 8px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 0.9em;
  outline: none;
  transition: border-color 0.2s;
}

.input-row input:focus {
  border-color: var(--orange);
}

.input-row button {
  padding: 10px 18px;
  background: linear-gradient(135deg, var(--orange), #FFA726);
  color: white;
  border: none;
  border-radius: 8px;
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
}

/* Goal Setting */
.goal-section {
  background: var(--card-bg);
  border-radius: var(--border-radius);
  padding: 12px 16px;
  margin-bottom: 16px;
  box-shadow: 0 2px 12px var(--shadow);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.goal-section label {
  font-weight: 500;
  font-size: 0.9em;
  color: var(--deep-orange);
}

.goal-section input {
  width: 60px;
  padding: 6px 10px;
  border: 2px solid #FFE0B2;
  border-radius: 8px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 0.9em;
  text-align: center;
  outline: none;
}

.goal-section input:focus {
  border-color: var(--orange);
}

.goal-section span {
  font-size: 0.85em;
  color: var(--text-light);
}

/* Student Board */
.board {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.student-row {
  background: var(--card-bg);
  border-radius: var(--border-radius);
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: 0 2px 8px var(--shadow);
  cursor: pointer;
  transition: all 0.2s;
  user-select: none;
  -webkit-user-select: none;
  position: relative;
  overflow: hidden;
}

.student-row:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 16px var(--shadow);
}

.student-row:active {
  transform: scale(0.98);
}

.student-row.goal-reached {
  background: linear-gradient(135deg, #FFF9C4, #FFECB3);
  border: 2px solid var(--gold);
}

.student-row .rank-badge {
  font-size: 1.4em;
  min-width: 30px;
  text-align: center;
}

.student-name {
  font-weight: 700;
  font-size: 1em;
  min-width: 80px;
}

.sticker-count {
  font-weight: 900;
  font-size: 1.3em;
  color: var(--orange);
  min-width: 40px;
  text-align: center;
}

.sticker-icons {
  flex: 1;
  font-size: 1.1em;
  line-height: 1.6;
  word-break: break-all;
}

.progress-bar {
  position: absolute;
  bottom: 0;
  left: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--gold), var(--orange));
  transition: width 0.4s ease;
  border-radius: 0 2px 0 0;
}

.delete-btn {
  background: none;
  border: none;
  color: #BDBDBD;
  font-size: 1.2em;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 50%;
  transition: all 0.2s;
}

.delete-btn:hover {
  color: var(--danger);
  background: #FFEBEE;
}

/* Sparkle Animation */
@keyframes sparkle {
  0% { transform: scale(0) rotate(0deg); opacity: 1; }
  50% { transform: scale(1.2) rotate(180deg); opacity: 0.8; }
  100% { transform: scale(0) rotate(360deg); opacity: 0; }
}

.sparkle {
  position: absolute;
  pointer-events: none;
  font-size: 1.5em;
  animation: sparkle 0.6s ease-out forwards;
}

/* Celebration */
@keyframes celebrate {
  0% { transform: scale(1); }
  25% { transform: scale(1.05); }
  50% { transform: scale(1); }
  75% { transform: scale(1.03); }
  100% { transform: scale(1); }
}

@keyframes confetti-fall {
  0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

.celebrating {
  animation: celebrate 0.5s ease;
}

.confetti {
  position: fixed;
  top: 0;
  font-size: 1.5em;
  animation: confetti-fall 3s ease-in forwards;
  pointer-events: none;
  z-index: 9999;
}

/* Leaderboard highlight */
.student-row.rank-1 {
  border-left: 4px solid #FFD700;
}

.student-row.rank-2 {
  border-left: 4px solid #C0C0C0;
}

.student-row.rank-3 {
  border-left: 4px solid #CD7F32;
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-light);
}

.empty-state .icon {
  font-size: 3em;
  margin-bottom: 12px;
}

.empty-state p {
  font-size: 0.95em;
}

/* History Modal */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.5);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.modal-overlay.active {
  display: flex;
}

.modal {
  background: white;
  border-radius: 16px;
  padding: 24px;
  max-width: 500px;
  width: 100%;
  max-height: 80vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}

.modal h2 {
  font-size: 1.2em;
  margin-bottom: 16px;
  color: var(--deep-orange);
}

.modal .history-week {
  background: #FFF8E1;
  border-radius: 8px;
  padding: 12px;
  margin-bottom: 8px;
}

.modal .history-week h4 {
  font-size: 0.85em;
  color: var(--orange);
  margin-bottom: 6px;
}

.modal .history-week p {
  font-size: 0.8em;
  color: var(--text-light);
  line-height: 1.6;
}

.modal .close-btn {
  display: block;
  margin: 16px auto 0;
  padding: 10px 24px;
  background: var(--orange);
  color: white;
  border: none;
  border-radius: 8px;
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 700;
  cursor: pointer;
}

/* Responsive */
@media (max-width: 600px) {
  body {
    padding: 10px;
  }

  .header h1 {
    font-size: 1.4em;
  }

  .controls {
    gap: 6px;
  }

  .controls button, .controls select {
    padding: 7px 12px;
    font-size: 0.8em;
  }

  .student-row {
    padding: 10px 12px;
    gap: 8px;
  }

  .student-name {
    min-width: 60px;
    font-size: 0.9em;
  }

  .sticker-count {
    font-size: 1.1em;
    min-width: 30px;
  }

  .sticker-icons {
    font-size: 0.9em;
  }
}
</style>
</head>
<body>

<div class="header">
  <h1>칭찬 스티커판</h1>
  <p>학생을 탭하면 스티커 +1 | 길게 누르거나 우클릭하면 -1</p>
</div>

<div class="controls">
  <button onclick="toggleInput()" class="success">+ 학생 추가</button>
  <select id="sortSelect" onchange="renderBoard()">
    <option value="name">이름순</option>
    <option value="count">스티커순</option>
  </select>
  <button onclick="showHistory()">기록 보기</button>
  <button onclick="resetWeek()" class="danger">이번 주 초기화</button>
  <button onclick="toggleTV()" class="tv-btn">TV 모드</button>
</div>

<div class="input-section" id="inputSection" style="display:none;">
  <h3>학생 이름 입력 (쉼표로 구분하여 여러 명 추가 가능)</h3>
  <div class="input-row">
    <input type="text" id="nameInput" placeholder="예: 김민수, 이서연, 박지호" onkeypress="if(event.key==='Enter')addStudents()">
    <button onclick="addStudents()">추가</button>
  </div>
</div>

<div class="goal-section">
  <label>목표 스티커:</label>
  <input type="number" id="goalInput" value="10" min="1" max="100" onchange="saveGoal()">
  <span>개 달성 시 축하 효과!</span>
</div>

<div class="board" id="board"></div>

<!-- History Modal -->
<div class="modal-overlay" id="historyModal" onclick="if(event.target===this)closeHistory()">
  <div class="modal">
    <h2>주간 기록</h2>
    <div id="historyContent"></div>
    <button class="close-btn" onclick="closeHistory()">닫기</button>
  </div>
</div>

<script>
// Data
let students = JSON.parse(localStorage.getItem('stickerBoard_students') || '[]');
let goal = parseInt(localStorage.getItem('stickerBoard_goal') || '10');
let history = JSON.parse(localStorage.getItem('stickerBoard_history') || '[]');
let sortMode = 'name';
let tvMode = false;

// Init
document.getElementById('goalInput').value = goal;

// Toggle input section
function toggleInput() {
  const section = document.getElementById('inputSection');
  section.style.display = section.style.display === 'none' ? 'block' : 'none';
  if (section.style.display === 'block') {
    document.getElementById('nameInput').focus();
  }
}

// Add students
function addStudents() {
  const input = document.getElementById('nameInput');
  const names = input.value.split(',').map(n => n.trim()).filter(n => n.length > 0);

  names.forEach(name => {
    if (!students.find(s => s.name === name)) {
      students.push({ name, count: 0 });
    }
  });

  input.value = '';
  saveData();
  renderBoard();
}

// Delete student
function deleteStudent(name, event) {
  event.stopPropagation();
  if (confirm(`"${name}" 학생을 삭제하시겠습니까?`)) {
    students = students.filter(s => s.name !== name);
    saveData();
    renderBoard();
  }
}

// Add sticker
function addSticker(name, element) {
  const student = students.find(s => s.name === name);
  if (!student) return;

  student.count++;
  saveData();

  // Sparkle effect
  createSparkle(element);

  // Check goal
  if (student.count === goal) {
    celebrate(name, element);
  }

  renderBoard();
}

// Remove sticker
function removeSticker(name) {
  const student = students.find(s => s.name === name);
  if (!student || student.count <= 0) return;

  student.count--;
  saveData();
  renderBoard();
}

// Sparkle effect
function createSparkle(element) {
  const sparkles = ['✨', '⭐', '🌟', '💫'];
  for (let i = 0; i < 5; i++) {
    const sparkle = document.createElement('span');
    sparkle.className = 'sparkle';
    sparkle.textContent = sparkles[Math.floor(Math.random() * sparkles.length)];
    sparkle.style.left = (Math.random() * 80 + 10) + '%';
    sparkle.style.top = (Math.random() * 80 + 10) + '%';
    sparkle.style.animationDelay = (Math.random() * 0.3) + 's';
    element.appendChild(sparkle);
    setTimeout(() => sparkle.remove(), 1000);
  }
}

// Celebration
function celebrate(name, element) {
  element.classList.add('celebrating');
  setTimeout(() => element.classList.remove('celebrating'), 500);

  // Confetti
  const confettiChars = ['🎉', '🎊', '⭐', '🌟', '✨', '🏆', '👏', '💯'];
  for (let i = 0; i < 20; i++) {
    const confetti = document.createElement('span');
    confetti.className = 'confetti';
    confetti.textContent = confettiChars[Math.floor(Math.random() * confettiChars.length)];
    confetti.style.left = (Math.random() * 100) + 'vw';
    confetti.style.animationDelay = (Math.random() * 1) + 's';
    confetti.style.animationDuration = (2 + Math.random() * 2) + 's';
    document.body.appendChild(confetti);
    setTimeout(() => confetti.remove(), 4000);
  }

  // Alert after short delay
  setTimeout(() => {
    alert(`🎉 축하합니다! "${name}" 학생이 목표 ${goal}개를 달성했습니다!`);
  }, 300);
}

// Render board
function renderBoard() {
  const board = document.getElementById('board');
  sortMode = document.getElementById('sortSelect').value;

  let sorted = [...students];
  if (sortMode === 'name') {
    sorted.sort((a, b) => a.name.localeCompare(b.name, 'ko'));
  } else {
    sorted.sort((a, b) => b.count - a.count);
  }

  if (sorted.length === 0) {
    board.innerHTML = `
      <div class="empty-state">
        <div class="icon">⭐</div>
        <p>아직 등록된 학생이 없습니다.<br>"+ 학생 추가" 버튼을 눌러 학생을 등록하세요.</p>
      </div>
    `;
    return;
  }

  // Calculate ranks for leaderboard
  const ranked = [...students].sort((a, b) => b.count - a.count);
  const getRank = (name) => {
    const idx = ranked.findIndex(s => s.name === name);
    if (idx === 0 && ranked[0].count > 0) return 1;
    if (idx === 1 && ranked[1].count > 0) return 2;
    if (idx === 2 && ranked[2].count > 0) return 3;
    return 0;
  };

  const rankEmoji = { 1: '🥇', 2: '🥈', 3: '🥉' };

  board.innerHTML = sorted.map(student => {
    const rank = getRank(student.name);
    const rankClass = rank ? `rank-${rank}` : '';
    const goalClass = student.count >= goal ? 'goal-reached' : '';
    const progress = Math.min((student.count / goal) * 100, 100);
    const stickers = '⭐'.repeat(Math.min(student.count, 50));

    return `
      <div class="student-row ${rankClass} ${goalClass}"
           onclick="addSticker('${escapeHtml(student.name)}', this)"
           oncontextmenu="event.preventDefault(); removeSticker('${escapeHtml(student.name)}')"
           data-name="${escapeHtml(student.name)}">
        <span class="rank-badge">${rankEmoji[rank] || ''}</span>
        <span class="student-name">${escapeHtml(student.name)}</span>
        <span class="sticker-count">${student.count}</span>
        <span class="sticker-icons">${stickers}</span>
        <button class="delete-btn" onclick="deleteStudent('${escapeHtml(student.name)}', event)" title="삭제">✕</button>
        <div class="progress-bar" style="width: ${progress}%"></div>
      </div>
    `;
  }).join('');

  // Long press for mobile
  setupLongPress();
}

// Long press support
function setupLongPress() {
  const rows = document.querySelectorAll('.student-row');
  rows.forEach(row => {
    let timer = null;
    let isLongPress = false;

    row.addEventListener('touchstart', (e) => {
      isLongPress = false;
      timer = setTimeout(() => {
        isLongPress = true;
        const name = row.dataset.name;
        removeSticker(name);
        // Vibrate if supported
        if (navigator.vibrate) navigator.vibrate(50);
      }, 500);
    });

    row.addEventListener('touchend', (e) => {
      clearTimeout(timer);
      if (isLongPress) {
        e.preventDefault();
        // Prevent the click from firing
        row.style.pointerEvents = 'none';
        setTimeout(() => row.style.pointerEvents = '', 100);
      }
    });

    row.addEventListener('touchmove', () => {
      clearTimeout(timer);
    });
  });
}

// Save/Load
function saveData() {
  localStorage.setItem('stickerBoard_students', JSON.stringify(students));
}

function saveGoal() {
  goal = parseInt(document.getElementById('goalInput').value) || 10;
  localStorage.setItem('stickerBoard_goal', goal.toString());
  renderBoard();
}

// Reset week
function resetWeek() {
  if (students.length === 0) return;

  if (!confirm('이번 주 스티커를 모두 초기화하시겠습니까?\n(기록은 저장됩니다)')) return;

  // Save to history
  const now = new Date();
  const weekStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  const record = {
    date: weekStr,
    data: students.map(s => ({ name: s.name, count: s.count }))
  };

  history.unshift(record);
  if (history.length > 20) history = history.slice(0, 20);
  localStorage.setItem('stickerBoard_history', JSON.stringify(history));

  // Reset counts
  students.forEach(s => s.count = 0);
  saveData();
  renderBoard();
}

// History
function showHistory() {
  const content = document.getElementById('historyContent');

  if (history.length === 0) {
    content.innerHTML = '<p style="text-align:center; color:#999; padding:20px;">아직 저장된 기록이 없습니다.</p>';
  } else {
    content.innerHTML = history.map(week => {
      const sorted = [...week.data].sort((a, b) => b.count - a.count);
      const lines = sorted.map(s => `${s.name}: ⭐${s.count}`).join(' | ');
      return `
        <div class="history-week">
          <h4>${week.date} 기록</h4>
          <p>${lines}</p>
        </div>
      `;
    }).join('');
  }

  document.getElementById('historyModal').classList.add('active');
}

function closeHistory() {
  document.getElementById('historyModal').classList.remove('active');
}

// TV Mode
function toggleTV() {
  tvMode = !tvMode;
  document.body.classList.toggle('tv-mode', tvMode);
}

// Utility
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML.replace(/'/g, "\\'");
}

// Initial render
renderBoard();
</script>
</body>
</html>
